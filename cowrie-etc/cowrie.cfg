# ==============================================================================
# cowrie.cfg — Configuración personalizada del Honeypot Cowrie
# Documentación: https://cowrie.readthedocs.io/
# ==============================================================================

[honeypot]
# Nombre del host que verá el atacante al conectarse
hostname = srv-prod-01

# Directorio de trabajo falso que ve el atacante
log_path = ${honeypot:state_path}/log

# Nivel de log: CRITICAL, ERROR, WARNING, INFO, DEBUG
# INFO es el balance ideal entre detalle y performance
log_level = INFO

# Máxima duración de una sesión (segundos) — evita que robots se queden conectados
interactive_timeout = 180
authentication_timeout = 120

[output_jsonlog]
# Activar output en JSON (requerido para el dashboard)
enabled = true
logfile = ${honeypot:log_path}/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie/cowrie.log

[ssh]
# Puerto interno donde escucha Cowrie (mapeado externamente via Docker)
listen_endpoints = tcp:2222:interface=0.0.0.0

# Banner SSH falso para simular un servidor real
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

[telnet]
enabled = false
listen_endpoints = tcp:2223:interface=0.0.0.0

[backend_pool]
# Credenciales que el honeypot acepta (para atrapar bots que prueban las clásicas)
# Las intentonas FALLIDAS también se loguean — esas son las más valiosas
